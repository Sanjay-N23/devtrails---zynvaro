<svg xmlns="http://www.w3.org/2000/svg" width="900" height="80" viewBox="0 0 900 80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&amp;display=swap');
    </style>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0097A7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00BCD4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00BCD4;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="80" fill="transparent"/>
  <text x="50" y="50" font-family="'Playfair Display', Georgia, serif" font-size="36" font-weight="800" fill="url(#grad)">Parametric Triggers — What Fires a Payout</text>
  <line x1="50" y1="65" x2="850" y2="65" stroke="url(#line)" stroke-width="2"/>
</svg>
